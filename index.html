<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PEPEPAINT</title>
		<link rel="stylesheet" href="styles.css" />
	</head>

	<body id="body">
		<div id="card">
			<!-- NAV -->
			<div class="nav-container" id="nav_container">
				<div id="header">
					<div class="header_item" id="header_title">PEPEPAINT</div>
					<div class="header_item controller" id="gallery_button">
						<a href="https://objkt.com/users/tz1QQkaUxPXKdpkPYe4w999wF9Abggicdad5/created" target="_blank">gallery</a>
					</div>
					<button class="header_button controller" id="submission_button">Submit</button>
				</div>

				<div id="info-bar">
					<div class="info-panel">
						<div class="info_row">h = hide controls</div>
						<div class="info_row">1-9 = fx</div>
						<div class="info_row">0 = rand</div>
						<div class="info_row">q-p = filters</div>
						<div class="info_row">j/k/l = animated filters</div>
						<div class="info_row">z/x = undo/redo</div>
						<div class="info_row">s = save png/gif</div>
						<div class="info_row">n/m = size</div>
						<div class="info_row">d/c = rotate</div>
						<div class="info_row">f/v = hold</div>
						<div class="info_row">g/b = flip</div>
					</div>
				</div>

				<div class="size-bar">
					<!-- SIZE -->
					<div class="menu_row">
						<div class="menu_control_title">Size</div>
						<div class="menu_range_input_container">
							<input
								name="brush_w"
								id="brush_w_input_range"
								type="range"
								min="1"
								max="560"
								value="50"
								class="controller brush_controller input_range slider_small"
								data-type="brush_dim" />
						</div>
					</div>

					<!-- OPACITY -->
					<div class="menu_row">
						<div class="menu_control_title">Opacity</div>
						<div class="menu_range_input_container">
							<input
								name="image_opacity"
								id="image_opacity_input_range"
								type="range"
								min="0"
								max="100"
								value="100"
								class="controller brush_controller input_range slider"
								data-type="image"
								data-controller="image_opacity" />
						</div>
					</div>
				</div>

				<div class="palette-bar">
					<div class="palette_tabs" role="tablist" aria-label="Palette controls">
						<button
							type="button"
							class="controller palette_tab is-active"
							id="palette_tab_brushes"
							role="tab"
							aria-selected="true"
							aria-controls="palette_panel_brushes"
							data-palette-tab="brushes">
							Brushes
						</button>
						<button
							type="button"
							class="controller palette_tab"
							id="palette_tab_fx"
							role="tab"
							aria-selected="false"
							aria-controls="palette_panel_fx"
							tabindex="-1"
							data-palette-tab="fx">
							FX
						</button>
						<button
							type="button"
							class="controller palette_tab"
							id="palette_tab_filters"
							role="tab"
							aria-selected="false"
							aria-controls="palette_panel_filters"
							tabindex="-1"
							data-palette-tab="filters">
							Filters
						</button>
						<button
							type="button"
							class="controller palette_tab"
							id="palette_tab_animations"
							role="tab"
							aria-selected="false"
							aria-controls="palette_panel_animations"
							tabindex="-1"
							data-palette-tab="animations">
							Animations
						</button>
					</div>

					<div class="palette_panels">
						<!-- BRUSHES -->
						<div class="palette_panel" id="palette_panel_brushes" role="tabpanel" aria-labelledby="palette_tab_brushes">
							<div class="palette_row">
								<div class="paint_controls_section">
									<div id="image_brush_controls" class="controls"></div>
								</div>
							</div>
						</div>
						<div class="palette_panel" id="palette_panel_fx" role="tabpanel" aria-labelledby="palette_tab_fx" hidden>
							<div class="fx_controls" aria-label="Brush effects">
								<button type="button" class="controller fx_toggle" data-fx-toggle="size" aria-pressed="false">size</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="follow" aria-pressed="false">follow</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="rotate" aria-pressed="false">rotate</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="mirror" aria-pressed="false">mirror</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="snap" aria-pressed="false">snap</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="increment" aria-pressed="false">increment</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="fx" aria-pressed="false">fx</button>
								<button type="button" class="controller fx_toggle" data-fx-toggle="blend" aria-pressed="false">blend</button>
							</div>
						</div>
						<div class="palette_panel" id="palette_panel_filters" role="tabpanel" aria-labelledby="palette_tab_filters" hidden>
							<div class="filter_controls" aria-label="Canvas filters">
								<button type="button" class="controller filter_button" data-filter-action="blurr">blur</button>
								<button type="button" class="controller filter_button" data-filter-action="invert">invert</button>
								<button type="button" class="controller filter_button" data-filter-action="threshold">threshold</button>
								<button type="button" class="controller filter_button" data-filter-action="dither">dither</button>
								<button type="button" class="controller filter_button" data-filter-action="dilate">dilate</button>
								<button type="button" class="controller filter_button" data-filter-action="erode">erode</button>
								<button type="button" class="controller filter_button" data-filter-action="emboss">emboss</button>
								<button type="button" class="controller filter_button" data-filter-action="edges">edges</button>
								<button type="button" class="controller filter_button" data-filter-action="glitch">glitch</button>
								<button type="button" class="controller filter_button" data-filter-action="pixelate">pixelate</button>
							</div>
						</div>
						<div class="palette_panel" id="palette_panel_animations" role="tabpanel" aria-labelledby="palette_tab_animations" hidden>
							<div class="filter_controls" aria-label="Canvas animations">
								<button type="button" class="controller filter_button" data-filter-action="animatedGlitch" aria-pressed="false">
									animated glitch
								</button>
								<button type="button" class="controller filter_button" data-filter-action="animatedVhs" aria-pressed="false">
									animated vhs
								</button>
								<button type="button" class="controller filter_button" data-filter-action="animatedDither" aria-pressed="false">
									animated dither
								</button>
								<button type="button" class="controller filter_button" data-filter-action="animatedWave" aria-pressed="false">
									animated wave
								</button>
							</div>
						</div>
					</div>
				</div>

				<div id="feedback-bar">
					<div class="feedback-panel">
						<div class="feedback_row">Hello: world</div>
					</div>
				</div>
			</div>

			<!-- CANVASES -->
			<div class="canvas-container" id="canvas_container">
				<canvas id="draw_canvas" class="drawing_canvas" width="400" height="560"></canvas>
				<canvas id="preview_canvas" width="400" height="560"></canvas>
			</div>

			<!-- SUBMISSIONS -->
			<dialog id="submission_dialog" class="submission_dialog">
				<form id="submission_form" class="submission_form">
					<div class="submission_form_header">
						<div id="submission_title">Submissions</div>
						<button type="button" class="header_button submission_close_button" id="submission_close_button" aria-label="Close submission window">
							x
						</button>
					</div>
					<div>
						<label class="submission_field">
							<span>Title</span>
							<input id="submission_title_input" name="title" type="text" maxlength="120" required />
						</label>
						<label class="submission_field">
							<span>Description</span>
							<textarea id="submission_description_input" name="description" maxlength="1000" rows="4"></textarea>
						</label>
						<label class="submission_field">
							<span>Editions</span>
							<input id="submission_editions_input" name="editions" type="number" min="1" max="10000" step="1" value="1" required />
						</label>
					</div>
					<div class="submission_actions">
						<button type="button" class="header_button" id="submission_cancel_button">Cancel</button>
						<button type="submit" class="header_button" id="submission_submit_button">Submit</button>
					</div>
					<div id="submission_status" class="submission_status" role="status" aria-live="polite">Status: Fill in the form</div>
				</form>
			</dialog>
		</div>
	</body>

	<script type="module" src="main.js"></script>
	<script type="module" src="filters.js"></script>
</html>
