<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>PEPEPAINT</title>
		<link rel="stylesheet" href="styles.css" />
	</head>

	<body id="body">
		<!-- CANVASES -->
		<div class="canvas-container" id="canvas_container">
			<div id="nav">
				<div class="nav_item" id="nav_title">PEPEPAINT</div>
				<div class="nav_item" id="gallery_button">
					<a href="https://objkt.com/collections/KT1Hk63AQL4VY63dCREX6DZtv5k3GnTtUXxk" target="_blank">gallery</a>
				</div>
				<button class="nav_button" id="submission_button">Submit</button>
			</div>

			<div class="size-bar">
				<!-- SIZE -->
				<div class="menu_row">
					<div class="menu_control_title">Size</div>
					<div class="controls range_and_number">
						<div class="menu_range_input_container">
							<input
								name="brush_w"
								id="brush_w_input_range"
								type="range"
								min="1"
								max="560"
								value="50"
								class="controller brush_controller input_range slider_small"
								data-type="brush_dim" />
						</div>
					</div>
				</div>

				<!-- OPACITY -->
				<div class="menu_row">
					<div class="menu_control_title">Opacity</div>
					<div class="controls range_and_number">
						<div class="menu_range_input_container">
							<input
								name="image_opacity"
								id="image_opacity_input_range"
								type="range"
								min="0"
								max="100"
								value="100"
								class="controller brush_controller input_range slider"
								data-type="image"
								data-controller="image_opacity" />
						</div>
					</div>
				</div>
			</div>

			<div class="palette-bar">
				<!-- BRUSHES -->
				<div class="palette_row">
					<div class="paint_controls_section">
						<div id="image_brush_controls" class="controls"></div>
					</div>
					<div class="info_row">1-9 = fx, q-p = filters,</div>
				</div>
			</div>

			<div class="fx-bar">
				<div class="palette_row">
					<div class="info_row">z/x = undo/redo, s = save, a = rand, h = hide controls</div>
					<div class="info_row">n/m = size, v/b = rotate, k/l = hold, d/f = flip</div>
				</div>
			</div>

			<canvas id="draw_canvas" class="drawing_canvas" width="400" height="560"></canvas>
			<canvas id="preview_canvas" width="400" height="560"></canvas>
		</div>

		<dialog id="submission_dialog" class="submission_dialog">
			<form id="submission_form" class="submission_form">
				<div class="submission_form_header">
					<div id="submission_title">Submissions</div>
					<button type="button" class="nav_button submission_close_button" id="submission_close_button" aria-label="Close submission window">
						x
					</button>
				</div>
				<div>
					<label class="submission_field">
						<span>Title</span>
						<input id="submission_title_input" name="title" type="text" maxlength="120" required />
					</label>
					<label class="submission_field">
						<span>Description</span>
						<textarea id="submission_description_input" name="description" maxlength="1000" rows="4"></textarea>
					</label>
					<label class="submission_field">
						<span>Editions</span>
						<input id="submission_editions_input" name="editions" type="number" min="1" max="10000" step="1" value="1" required />
					</label>
				</div>
				<div class="submission_actions">
					<button type="button" class="nav_button" id="submission_cancel_button">Cancel</button>
					<button type="submit" class="nav_button" id="submission_submit_button">Submit</button>
				</div>
				<div id="submission_status" class="submission_status" role="status" aria-live="polite">Status: Fill in the form</div>
			</form>
		</dialog>
	</body>

	<script type="module" src="main.js"></script>
	<script type="module" src="filters.js"></script>
</html>
